name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            git config --global --add safe.directory /home/dwsa/public_html/website
            cd /home/dwsa/public_html/website
            GIT_SSH_COMMAND="ssh -i /home/developers/.ssh/id_ed25519" git pull origin main
            php /usr/local/bin/composer install --no-dev --optimize-autoloader --ignore-platform-req=php
            php artisan migrate --force
            php artisan filament:upgrade
            php artisan config:cache
            php artisan route:cache
            php artisan view:clear
            php artisan storage:link
            chown -R dwsa:dwsa /home/dwsa/public_html/website
            chmod 711 /home/dwsa
            chmod 755 /home/dwsa/public_html
            chmod -R 755 /home/dwsa/public_html/website
            chmod 644 /home/dwsa/public_html/website/.htaccess
            chmod -R 775 /home/dwsa/public_html/website/storage
            chmod -R 775 /home/dwsa/public_html/website/bootstrap/cache
